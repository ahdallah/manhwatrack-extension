<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ManhwaTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; min-height: 160px; background: #0A0A0B; color: #F2EDDF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid rgba(242,237,223,0.06); }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-circle { width: 22px; height: 22px; border-radius: 50%; background: #E85D3C; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
    .logo-text { font-family: monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(242,237,223,0.7); }
    .open-site { font-family: monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #E85D3C; text-decoration: none; border: 1px solid rgba(232,93,60,0.3); padding: 3px 8px; border-radius: 4px; }

    .body { padding: 16px; }

    /* Token input view */
    #token-view h2 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    #token-view p { font-size: 12px; color: rgba(242,237,223,0.4); margin-bottom: 14px; line-height: 1.5; }
    .token-input { width: 100%; background: #17171B; border: 1px solid rgba(242,237,223,0.1); color: #F2EDDF; font-family: monospace; font-size: 11px; padding: 9px 10px; border-radius: 6px; margin-bottom: 8px; outline: none; }
    .token-input:focus { border-color: #E85D3C; }
    .connect-btn { width: 100%; background: #E85D3C; color: #0A0A0B; font-family: monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; }
    .get-token-link { display: block; text-align: center; font-family: monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(242,237,223,0.3); text-decoration: none; }
    .get-token-link:hover { color: #E85D3C; }

    /* Connected view */
    #user-view { display: none; }
    .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(242,237,223,0.06); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E85D3C; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #0A0A0B; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 13px; font-weight: 600; }
    .tracking-on { display: flex; align-items: center; gap: 5px; font-family: monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #1EC864; margin-top: 2px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #1EC864; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .disconnect-btn { font-family: monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(242,237,223,0.25); background: none; border: none; cursor: pointer; margin-left: auto; }
    .disconnect-btn:hover { color: #FF5050; }

    #current-page { background: #17171B; border: 1px solid rgba(242,237,223,0.06); border-radius: 8px; padding: 10px 12px; }
    .current-label { font-family: monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(242,237,223,0.25); margin-bottom: 5px; }
    .current-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .current-ch { font-family: monospace; font-size: 11px; color: #E85D3C; margin-top: 2px; }
    .not-detected { font-size: 12px; color: rgba(242,237,223,0.3); }

    #status-msg { font-family: monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; padding: 6px 10px; border-radius: 6px; margin-top: 10px; display: none; }
    #status-msg.success { background: rgba(30,200,100,0.1); color: #1EC864; display: block; }
    #status-msg.error { background: rgba(255,80,80,0.1); color: #FF5050; display: block; }

    .footer { padding: 10px 16px; border-top: 1px solid rgba(242,237,223,0.04); display: flex; justify-content: center; gap: 16px; }
    .footer a { font-family: monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(242,237,223,0.25); text-decoration: none; }
    .footer a:hover { color: rgba(242,237,223,0.5); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-circle">MT</div>
      <span class="logo-text">ManhwaTrack</span>
    </div>
    <a href="https://manhwatrack.com" target="_blank" class="open-site">Open ↗</a>
  </div>

  <!-- Token input view -->
  <div id="token-view" class="body">
    <h2>Connect your account</h2>
    <p>Paste your extension token from<br>manhwatrack.com/settings</p>
    <input type="password" id="token-input" class="token-input" placeholder="Paste your token here..." autocomplete="off" />
    <button class="connect-btn" id="connect-btn">Connect</button>
    <a href="https://manhwatrack.com/settings" target="_blank" class="get-token-link">
      Get your token at manhwatrack.com/settings →
    </a>
    <div id="status-msg"></div>
  </div>

  <!-- Connected view -->
  <div id="user-view">
    <div class="body">
      <div class="user-row">
        <div class="avatar" id="user-avatar"></div>
        <div>
          <div class="user-name" id="username-display">—</div>
          <div class="tracking-on"><span class="dot"></span> Auto-tracking on</div>
        </div>
        <button class="disconnect-btn" id="disconnect-btn">Disconnect</button>
      </div>
      <div id="current-page">
        <div class="current-label">Current page</div>
        <div id="page-content"><div class="not-detected">Not a supported reading page</div></div>
      </div>
      <div id="status-msg"></div>
    </div>
    <div class="footer">
      <a href="https://manhwatrack.com/list" target="_blank">My List</a>
      <a href="https://manhwatrack.com/recent" target="_blank">Recent</a>
      <a href="https://manhwatrack.com/settings" target="_blank">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
