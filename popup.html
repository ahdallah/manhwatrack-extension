<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManhwaTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 200px;
      background: #0A0A0B;
      color: #F2EDDF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(242,237,223,0.06);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #E85D3C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .logo-text {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(242,237,223,0.7);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .open-site {
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #E85D3C;
      text-decoration: none;
      border: 1px solid rgba(232,93,60,0.3);
      padding: 3px 8px;
      border-radius: 4px;
    }
    .logout-btn {
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242,237,223,0.3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 0;
    }

    /* Body */
    .body { padding: 16px; }

    /* Login state */
    #login-view { text-align: center; padding: 24px 16px; }
    #login-view h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    #login-view p {
      font-size: 12px;
      color: rgba(242,237,223,0.4);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .login-btn {
      display: block;
      width: 100%;
      background: #E85D3C;
      color: #0A0A0B;
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    /* Logged in state */
    #user-view { display: none; }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(242,237,223,0.06);
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #E85D3C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #0A0A0B;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info .name {
      font-size: 13px;
      font-weight: 600;
      color: #F2EDDF;
    }
    .user-info .sub {
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242,237,223,0.3);
      margin-top: 2px;
    }

    /* Current page detection */
    #current-page {
      background: #111114;
      border: 1px solid rgba(242,237,223,0.06);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .current-label {
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(242,237,223,0.3);
      margin-bottom: 6px;
    }
    .current-title {
      font-size: 13px;
      font-weight: 600;
      color: #F2EDDF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .current-chapter {
      font-family: monospace;
      font-size: 11px;
      color: #E85D3C;
      margin-top: 3px;
    }
    .not-detected {
      font-size: 12px;
      color: rgba(242,237,223,0.3);
    }

    /* Status message */
    #status-msg {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    #status-msg.success {
      background: rgba(30,200,100,0.1);
      color: #1EC864;
      display: block;
    }
    #status-msg.error {
      background: rgba(255,80,80,0.1);
      color: #FF5050;
      display: block;
    }

    /* Footer links */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(242,237,223,0.04);
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .footer a {
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242,237,223,0.25);
      text-decoration: none;
    }
    .footer a:hover { color: rgba(242,237,223,0.5); }

    /* Tracking status indicator */
    .tracking-on {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1EC864;
    }
    .tracking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1EC864;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-circle">MT</div>
      <span class="logo-text">ManhwaTrack</span>
    </div>
    <div class="header-actions">
      <a href="https://manhwatrack.com" target="_blank" class="open-site">Open site ↗</a>
    </div>
  </div>

  <!-- Login view -->
  <div id="login-view" class="body">
    <h2>Track as you read</h2>
    <p>Sign in to automatically save your reading progress across all supported sites.</p>
    <button class="login-btn" id="login-btn">Sign in to ManhwaTrack</button>
    <p style="font-size:11px;color:rgba(242,237,223,0.2);margin-top:8px">
      Supports MangaDex, Webtoon, Flixscans, Bato.to and 15+ more
    </p>
  </div>

  <!-- Logged in view -->
  <div id="user-view">
    <div class="body">

      <!-- User row -->
      <div class="user-row">
        <div class="avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="name" id="username-display">—</div>
          <div class="sub">
            <span class="tracking-on">
              <span class="tracking-dot"></span>
              Auto-tracking on
            </span>
          </div>
        </div>
        <button class="logout-btn" id="logout-btn" style="margin-left:auto">Sign out</button>
      </div>

      <!-- Current page -->
      <div id="current-page">
        <div class="current-label">Current page</div>
        <div id="page-content">
          <div class="not-detected">Not a supported reading page</div>
        </div>
      </div>

      <!-- Status message -->
      <div id="status-msg"></div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://manhwatrack.com/list" target="_blank">My List</a>
      <a href="https://manhwatrack.com/recent" target="_blank">Recent</a>
      <a href="https://manhwatrack.com/rankings" target="_blank">Rankings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
